name: Build and Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3 등의 태그가 푸시될 때 실행
  workflow_dispatch:  # 수동으로도 실행 가능

jobs:
  build:
    name: Build for multiple platforms
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'  # Go 버전 (필요시 수정)

      - name: Get dependencies
        run: go mod download

      - name: Build for Windows (amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build -o bachata-bot-windows-amd64.exe
        env:
          CGO_ENABLED: 0

      - name: Build for macOS (arm64 - Apple Silicon)
        run: |
          GOOS=darwin GOARCH=arm64 go build -o bachata-bot-macos-arm64
        env:
          CGO_ENABLED: 0

      - name: Build for macOS (amd64 - Intel)
        run: |
          GOOS=darwin GOARCH=amd64 go build -o bachata-bot-macos-amd64
        env:
          CGO_ENABLED: 0

      - name: Build for Linux (amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bachata-bot-linux-amd64
        env:
          CGO_ENABLED: 0

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Windows Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bachata-bot-windows-amd64.exe
          asset_name: bachata-bot-windows-amd64.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS ARM64 Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bachata-bot-macos-arm64
          asset_name: bachata-bot-macos-arm64
          asset_content_type: application/octet-stream

      - name: Upload macOS AMD64 Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bachata-bot-macos-amd64
          asset_name: bachata-bot-macos-amd64
          asset_content_type: application/octet-stream

      - name: Upload Linux Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./bachata-bot-linux-amd64
          asset_name: bachata-bot-linux-amd64
          asset_content_type: application/octet-stream
